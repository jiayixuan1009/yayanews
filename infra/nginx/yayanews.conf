# yayanews nginx config - restored 2026-04-04
upstream yayanews_next {
    server 127.0.0.1:3002;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=20r/m;

server {
    listen 80;
    listen [::]:80;
    server_name yayanews.cryptooptiontool.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yayanews.cryptooptiontool.com;

    ssl_certificate     /etc/letsencrypt/live/yayanews.cryptooptiontool.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yayanews.cryptooptiontool.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 16m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Serve static public files directly from disk (logo, images, covers)
    location /brand/ {
        alias /var/www/yayanews/apps/web/.next/standalone/apps/web/public/brand/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        alias /var/www/yayanews/apps/web/.next/standalone/apps/web/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /covers/ {
        alias /var/www/yayanews/apps/web/.next/standalone/apps/web/public/covers/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SSE long-polling
    location ~ ^/api/(flash/events|live/events) {
        proxy_pass http://yayanews_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Admin Panel (apps/admin running on 3003)
    location /admin {
        limit_req zone=admin_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST Admin API (apps/admin/api)
    location /api/admin {
        limit_req zone=admin_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public API rate limiting
    location /api/ {
        limit_req zone=api_limit burst=15 nodelay;
        proxy_pass http://yayanews_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static 503 maintenance page (served when Next.js is down)
    error_page 502 503 504 /503.html;
    location = /503.html {
        root /var/www/yayanews/apps/web/public;
        internal;
    }

    # Main Web App
    location / {
        proxy_pass http://yayanews_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
