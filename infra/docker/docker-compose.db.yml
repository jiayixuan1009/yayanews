

# ==========================================================
# Server B (数据中心专用节点) - Docker Compose 架构
# 用途：只提供底层数据持久化与缓存通道，与应用节点的资源消耗彻底断绝！
# ==========================================================
services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: yayanews_postgres_storage
    restart: always
    environment:
      # 必须显式提供，缺失则容器启动失败（防止默认弱密码上线）
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
    command: >
      postgres 
      -c shared_buffers=256MB 
      -c work_mem=16MB 
      -c maintenance_work_mem=64MB
    ports:
      # 默认仅绑定 127.0.0.1，避免端口被公网直接探测到。
      # 如需跨主机访问，请将 BIND_IP 设为内网 IP，并在云安全组中限制来源。
      - "${BIND_IP:-127.0.0.1}:5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yayanews_super} -d ${POSTGRES_DB:-yayanews}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G # 适配 2GB 内存的主机：留出 1G 供给了底层 OS 和 Redis 运转

  redis:
    image: redis:7-alpine
    container_name: yayanews_redis_storage
    restart: always
    environment:
      # 显式必填，避免误用默认弱密码上线
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    ports:
      # 同 PG，默认仅绑回环；跨主机访问请显式 BIND_IP + 云安全组白名单
      - "${BIND_IP:-127.0.0.1}:6379:6379"
    volumes:
      - ./redisdata:/data
