name: Monorepo CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Typings Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Turbo/Monorepo Build
        # 此阶段严格校验各子包的 TypeScript 语法与 Next.js Standalone 能否成功打包
        # 只要某一个包里的 API 签名不匹配或循环引用，这里直接爆红中断合并
        run: npm run build

  python-check:
    name: Pipeline Worker Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: pip install -r apps/pipeline/requirements.txt
        
      - name: Static Syntax Check (Flake8 / Black / MyPy)
        # 这里预留语法检查，暂时只做依赖挂载验证
        run: |
          python -m py_compile apps/pipeline/**/*.py
