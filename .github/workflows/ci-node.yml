name: Node & UI Integrity

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'apps/ws-server/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'infra/scripts/copy-standalone.mjs'
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'apps/ws-server/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-and-typecheck:
    name: Build & Typings Verification
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fakeuser
          POSTGRES_PASSWORD: fakepassword
          POSTGRES_DB: yayanews
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DATABASE_URL: "postgresql://fakeuser:fakepassword@127.0.0.1:5432/yayanews"
      REDIS_URL: "redis://127.0.0.1:6379"
      SKIP_DB_INIT: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.17.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint workspaces
        run: npm run lint

      - name: Build workspaces
        run: npm run build
