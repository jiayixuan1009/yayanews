name: Pipeline Dependency Check

on:
  pull_request:
    paths:
      - 'apps/pipeline/**'
  push:
    branches: [ main ]
    paths:
      - 'apps/pipeline/**'

jobs:
  python-env-isolation:
    name: Requirements Missing Verifier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install pipeline dependencies
        run: pip install -r apps/pipeline/requirements.txt

      - name: Compile pipeline sources
        run: python -m compileall -q apps/pipeline/pipeline apps/pipeline/scripts
